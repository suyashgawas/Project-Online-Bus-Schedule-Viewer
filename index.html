<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sawantwadi Bus Stand</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🚍 Sawantwadi Bus Stand</h1>
  <p>MSRTC Bus Timetable</p>
 
<div class="ticker">
  <div class="ticker-text" id="tickerText"></div>
</div>

<div class="container">

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search route (Mumbai, Pune...)">

    <select id="busTypeFilter">
      <option value="">All Types</option>
      <option value="Ac">AC</option>
      <option value="Non-Ac">Non-AC</option>
      <option value="Sleeper">Sleeper</option>
      <option value="Local">Local</option>
    </select>

    <button onclick="searchBus()">Search</button>
  </div>

  <div id="busList"></div>

</div>
  <div class="bottom-book">
  <a href="https://npublic.msrtcors.com/" target="_blank">
    🎫 Book MSRTC Ticket
  </a>
</div>
<div class="contact-box">
  <h3>📍 Contact Information</h3>
  <p>📌 Sawantwadi Bus Stand</p>
  <p>📞 Phone: <a href="tel:02363272040">02363-272040</a></p>
  <p>🕒 Open: 24 Hours</p>
</div>
<footer>
  
  © 2026 Sawantwadi Bus Stand | MSRTC Style UI
</footer>

<script src="script.js"></script>

</body>
</html>
