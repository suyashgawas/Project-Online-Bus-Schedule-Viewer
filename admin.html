<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard - Sawantwadi Bus Stand</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background: #f4f6f9;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: #004aad;
      color: white;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
    }

    .sidebar button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: white;
      color: #004aad;
      border: none;
      cursor: pointer;
      font-weight: 600;
      border-radius: 5px;
    }

    .logout {
      background: red !important;
      color: white !important;
    }

    /* Main Content */
    .main {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }

    .header {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }

    input, select {
      padding: 10px;
      margin: 8px 0;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .add-btn {
      background: #004aad;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      border-radius: 5px;
      margin-top: 10px;
      width: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    table th, table td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    .delete-btn {
      background: red;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    /* Login Screen */
    .login-screen {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
    }

    .login-box h2 {
      margin-bottom: 20px;
    }

    .login-btn {
      background: #004aad;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 5px;
      cursor: pointer;
    }

  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>Admin Login</h2>
    <input type="password" id="password" placeholder="Enter Password">
    <button class="login-btn" onclick="login()">Login</button>
    <p id="error" style="color:red;"></p>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Admin Panel</h2>
  <button onclick="location.href='index.html'">View Website</button>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">
  <div class="header">Dashboard</div>

  <div class="card">
    <h3>Add New Bus</h3>
    <input type="text" id="route" placeholder="Route (Sawantwadi → Pune)">
    <input type="text" id="time" placeholder="Time (06:30 PM)">
    <select id="type">
      <option value="Ac">Ac</option>
      <option value="Non-Ac">Non-Ac</option>
      <option value="Sleeper">Sleeper</option>
      <option value="Local">Local</option>
    </select>
    <button class="add-btn" onclick="addBus()">Add Bus</button>
  </div>

  <div class="card">
    <h3>All Buses</h3>
    <table>
      <thead>
        <tr>
          <th>Route</th>
          <th>Time</th>
          <th>Type</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="busTable"></tbody>
    </table>
  </div>
</div>

<script>
  const ADMIN_PASSWORD = "1234";

  let buses = JSON.parse(localStorage.getItem("buses")) || [];

  if (localStorage.getItem("adminLoggedIn") === "true") {
    document.getElementById("loginScreen").style.display = "none";
  }

  function login() {
    const pass = document.getElementById("password").value;
    if (pass === ADMIN_PASSWORD) {
      localStorage.setItem("adminLoggedIn", "true");
      document.getElementById("loginScreen").style.display = "none";
    } else {
      document.getElementById("error").innerText = "Wrong Password!";
    }
  }

  function logout() {
    localStorage.removeItem("adminLoggedIn");
    location.reload();
  }

  function saveData() {
    localStorage.setItem("buses", JSON.stringify(buses));
  }

  function addBus() {
    const route = routeInput = document.getElementById("route").value;
    const time = document.getElementById("time").value;
    const type = document.getElementById("type").value;

    if (!route || !time) {
      alert("Fill all fields");
      return;
    }

    buses.push({ route, time, type });
    saveData();
    displayBuses();

    document.getElementById("route").value = "";
    document.getElementById("time").value = "";
  }

  function deleteBus(index) {
    buses.splice(index, 1);
    saveData();
    displayBuses();
  }

  function displayBuses() {
    const table = document.getElementById("busTable");
    table.innerHTML = "";

    buses.forEach((bus, index) => {
      table.innerHTML += `
        <tr>
          <td>${bus.route}</td>
          <td>${bus.time}</td>
          <td>${bus.type}</td>
          <td><button class="delete-btn" onclick="deleteBus(${index})">Delete</button></td>
        </tr>
      `;
    });
  }

  displayBuses();
</script>

</body>
</html>
